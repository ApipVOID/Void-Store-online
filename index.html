<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID STORE | Domain Expansion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --purple-void: #a0f; --deep-black: #020202; }
        body { background-color: var(--deep-black); color: white; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }

        /* --- ADVANCED VOID BACKGROUND --- */
        .void-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at 50% 50%, #0a0015 0%, #000 100%);
        }
        .void-eye {
            position: absolute; top: 50%; left: 50%; width: 120vh; height: 120vh;
            background: radial-gradient(circle, rgba(170, 0, 255, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%); border-radius: 50%; filter: blur(80px);
            animation: pulse 12s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; } }

        /* --- UI ELEMENTS --- */
        .glow-text { text-shadow: 0 0 15px var(--purple-void); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(160, 0, 255, 0.1); }
        
        .void-card {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%); /* Cyberpunk Cut */
        }
        .void-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--purple-void);
            box-shadow: 0 20px 40px rgba(160, 0, 255, 0.2);
        }

        .product-img {
            width: 100%; height: 280px; object-fit: cover;
            transition: 0.6s; filter: saturate(1.2);
        }
        .is-sold-out { filter: grayscale(1) brightness(0.3) contrast(1.2); }

        /* --- CART SYSTEM --- */
        #cartFloat {
            position: fixed; bottom: 30px; right: 30px; z-index: 90;
            transform: scale(0); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #cartFloat.active { transform: scale(1); }

        /* Custom Scroll */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--purple-void); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="void-bg"><div class="void-eye"></div></div>

    <div class="flex justify-between items-center mb-10 relative z-50">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-purple-600 rounded-full animate-ping"></div>
            <span class="text-[10px] tracking-widest uppercase text-purple-400">System Online</span>
        </div>
        <button onclick="showLogin()" id="loginBtn" class="text-[10px] glass px-6 py-2 rounded-full hover:bg-purple-600 transition uppercase font-bold">Terminal</button>
    </div>

    <header class="text-center mb-16 relative z-10">
        <h1 class="text-7xl md:text-8xl font-black glow-text mb-4 italic tracking-tighter uppercase italic">Void<span class="text-purple-600">.</span></h1>
        <div class="max-w-2xl mx-auto glass rounded-2xl p-2 flex items-center">
            <input type="text" id="searchBar" oninput="handleSearch(this.value)" placeholder="Locate artifacts..." class="w-full bg-transparent p-4 outline-none text-center text-lg font-light">
        </div>
        <div class="flex flex-wrap justify-center gap-3 mt-8" id="tabsContainer"></div>
    </header>

    <main id="catalog" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 relative z-10 min-h-[400px]">
        </main>

    <div id="cartFloat" class="glass p-6 rounded-[2rem] shadow-2xl border-2 border-purple-500 w-80">
        <h3 class="text-xs font-bold uppercase tracking-widest mb-4 text-purple-400">Selected Items</h3>
        <div id="cartItems" class="max-h-60 overflow-y-auto mb-4 space-y-2"></div>
        <div class="flex gap-2">
            <button onclick="checkout('wa')" class="flex-1 bg-green-600 py-3 rounded-xl text-[10px] font-bold uppercase">WhatsApp</button>
            <button onclick="clearCart()" class="bg-red-900/50 px-4 rounded-xl text-xs">✕</button>
        </div>
    </div>

    <section id="adminPanel" class="max-w-6xl mx-auto mb-20 p-8 glass rounded-[3rem] hidden border-t-4 border-purple-600">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <div class="space-y-3">
                <h4 class="text-xs font-bold text-purple-400 uppercase">Artifact Deployment</h4>
                <input type="text" id="pName" placeholder="Name" class="w-full bg-white/5 p-3 rounded-xl outline-none border border-white/10">
                <input type="number" id="pPrice" placeholder="Price (Numbers only)" class="w-full bg-white/5 p-3 rounded-xl outline-none border border-white/10">
                <input type="text" id="pImg" placeholder="Image Link" class="w-full bg-white/5 p-3 rounded-xl outline-none border border-white/10">
                <select id="pCatSelect" class="w-full bg-black p-3 rounded-xl border border-white/10"></select>
                <button onclick="addProduct()" class="w-full bg-purple-600 font-bold py-3 rounded-xl uppercase text-xs">Push to Void</button>
            </div>
            <div class="space-y-3">
                <h4 class="text-xs font-bold text-purple-400 uppercase">Space Mapping</h4>
                <div class="flex gap-2"><input type="text" id="newCatName" class="w-full bg-white/5 p-3 rounded-xl outline-none border border-white/10"><button onclick="addCategory()" class="bg-purple-600 px-5 rounded-xl">+</button></div>
                <div id="adminCatList" class="space-y-2"></div>
            </div>
            <div class="space-y-3">
                <h4 class="text-xs font-bold text-purple-400 uppercase">Core Config</h4>
                <input type="text" id="cfgWa" placeholder="WA (628...)" class="w-full bg-white/5 p-3 rounded-xl border border-white/10">
                <input type="text" id="cfgTele" placeholder="Tele User" class="w-full bg-white/5 p-3 rounded-xl border border-white/10">
                <button onclick="updateConfig()" class="w-full border border-purple-500 py-3 rounded-xl uppercase text-[10px]">Sync Core</button>
                <button onclick="logout()" class="w-full text-red-500 text-[10px] mt-4 uppercase">Disconnect Admin</button>
            </div>
        </div>
    </section>

    <div id="loginModal" class="fixed inset-0 bg-black/98 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="glass p-10 rounded-[3rem] w-full max-w-sm text-center border-b-4 border-purple-600">
            <h2 class="text-2xl font-bold mb-8 glow-text">KEY AUTHENTICATION</h2>
            <input type="text" id="userIn" placeholder="User ID" class="w-full bg-white/5 p-4 rounded-2xl mb-4 border border-white/10 outline-none">
            <input type="password" id="passIn" placeholder="Pass Key" class="w-full bg-white/5 p-4 rounded-2xl mb-8 border border-white/10 outline-none">
            <button onclick="attemptLogin()" class="w-full bg-purple-600 py-4 rounded-2xl font-bold shadow-lg shadow-purple-500/20">ACCESS TERMINAL</button>
            <button onclick="hideLogin()" class="mt-6 text-gray-500 text-xs">Abort</button>
        </div>
    </div>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyBSH2PhtUHv16CzGiMro6c2aODAtpltZrU",
            authDomain: "voidstore-b995f.firebaseapp.com",
            databaseURL: "https://voidstore-b995f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voidstore-b995f",
            storageBucket: "voidstore-b995f.firebasestorage.app",
            messagingSenderId: "210609106495",
            appId: "1:210609106495:web:d3d6d31d9ca8427c48928a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { isAdmin: false, products: {}, categories: {}, config: {}, cart: [], currentTab: 'all', search: '' };

        // CORE LOGIC
        db.ref('/').on('value', snap => {
            const data = snap.val() || {};
            state.products = data.products || {};
            state.categories = data.categories || {};
            state.config = data.config || { wa: '628', tele: 'void', text: 'Order artifact' };
            render();
        });

        function render() {
            renderTabs();
            renderCatalog();
            renderAdmin();
            renderCart();
        }

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            let html = `<button onclick="setTab('all')" class="px-6 py-2 rounded-full border border-white/10 text-xs uppercase font-bold transition ${state.currentTab === 'all' ? 'bg-purple-600 border-purple-600' : ''}">All</button>`;
            Object.keys(state.categories).forEach(k => {
                const cat = state.categories[k];
                const slug = cat.name.toLowerCase().replace(/\s+/g, '-');
                html += `<button onclick="setTab('${slug}')" class="px-6 py-2 rounded-full border border-white/10 text-xs uppercase font-bold transition ${state.currentTab === slug ? 'bg-purple-600 border-purple-600' : ''}">${cat.name}</button>`;
            });
            container.innerHTML = html;
        }

        function renderCatalog() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';
            
            Object.keys(state.products).forEach(id => {
                const p = state.products[id];
                if ((state.currentTab === 'all' || p.category === state.currentTab) && p.name.toLowerCase().includes(state.search.toLowerCase())) {
                    catalog.innerHTML += `
                        <div class="void-card glass relative overflow-hidden group">
                            ${p.soldOut ? '<div class="absolute inset-0 z-20 flex items-center justify-center font-black text-2xl rotate-12 text-white border-4 border-white m-10 pointer-events-none">VOID SOLD</div>' : ''}
                            <img src="${p.img}" class="product-img ${p.soldOut ? 'is-sold-out' : 'group-hover:scale-110'}">
                            <div class="p-6">
                                <h3 class="font-bold text-lg mb-1 truncate">${p.name}</h3>
                                <p class="text-purple-400 font-black mb-6">IDR ${Number(p.price).toLocaleString('id-ID')}</p>
                                ${!p.soldOut ? `
                                    <button onclick="addToCart('${id}')" class="w-full bg-white text-black py-3 rounded-xl font-bold text-[10px] uppercase hover:bg-purple-600 hover:text-white transition">Add to Cart</button>
                                ` : '<div class="h-10"></div>'}
                            </div>
                            ${state.isAdmin ? `
                                <div class="absolute top-2 left-2 flex gap-2 z-30">
                                    <button onclick="db.ref('products/${id}').remove()" class="bg-red-600 p-2 rounded-lg text-xs">Del</button>
                                    <button onclick="db.ref('products/${id}').update({soldOut: ${!p.soldOut}})" class="bg-black p-2 rounded-lg text-xs">Status</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
            });
        }

        // CART LOGIC
        function addToCart(id) {
            const p = state.products[id];
            state.cart.push(p);
            renderCart();
            document.getElementById('cartFloat').classList.add('active');
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            container.innerHTML = state.cart.map((item, index) => `
                <div class="flex justify-between items-center text-[10px] bg-white/5 p-2 rounded-lg">
                    <span>${item.name}</span>
                    <button onclick="removeFromCart(${index})" class="text-red-500 font-bold">✕</button>
                </div>
            `).join('');
            if (state.cart.length === 0) document.getElementById('cartFloat').classList.remove('active');
        }

        function removeFromCart(i) { state.cart.splice(i, 1); renderCart(); }
        function clearCart() { state.cart = []; renderCart(); }

        function checkout(platform) {
            const items = state.cart.map(i => `- ${i.name} (IDR ${Number(i.price).toLocaleString('id-ID')})`).join('%0A');
            const msg = `${state.config.text}:%0A${items}`;
            if(platform === 'wa') window.open(`https://wa.me/${state.config.wa}?text=${msg}`);
        }

        // ADMIN TOOLS
        function setTab(t) { state.currentTab = t; render(); }
        function handleSearch(v) { state.search = v; render(); }
        function showLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function hideLogin() { document.getElementById('loginModal').classList.add('hidden'); }
        function attemptLogin() {
            if(document.getElementById('userIn').value === 'admin9080' && document.getElementById('passIn').value === '9080') {
                state.isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                hideLogin(); render();
            } else alert('Wrong Key!');
        }
        function logout() { state.isAdmin = false; document.getElementById('adminPanel').classList.add('hidden'); render(); }

        function addProduct() {
            const n = document.getElementById('pName').value, p = document.getElementById('pPrice').value, i = document.getElementById('pImg').value, c = document.getElementById('pCatSelect').value;
            if(n && p && c) db.ref('products').push({name:n, price:p, img:i || 'https://via.placeholder.com/500', category:c, soldOut:false});
        }

        function addCategory() {
            const n = document.getElementById('newCatName').value;
            if(n) db.ref('categories').push({name:n});
        }

        function updateConfig() {
            db.ref('config').set({wa: document.getElementById('cfgWa').value, tele: document.getElementById('cfgTele').value, text: 'Saya mau order'});
        }

        function renderAdmin() {
            const select = document.getElementById('pCatSelect');
            const list = document.getElementById('adminCatList');
            select.innerHTML = ''; list.innerHTML = '';
            Object.keys(state.categories).forEach(k => {
                const cat = state.categories[k];
                select.innerHTML += `<option value="${cat.name.toLowerCase().replace(/\s+/g, '-')}">${cat.name}</option>`;
                list.innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-xs"><span>${cat.name}</span><button onclick="db.ref('categories/${k}').remove()" class="text-red-500">✕</button></div>`;
            });
            document.getElementById('cfgWa').value = state.config.wa || '';
            document.getElementById('cfgTele').value = state.config.tele || '';
        }
    </script>
</body>
</html>
