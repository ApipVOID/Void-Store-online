<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID STORE | Web Jualan by APIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --purple-void: #a0f; }
        body { background-color: #000; color: white; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }

        /* --- UNLIMITED VOID CORE ENGINE --- */
        .unlimited-void-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #000;
        }

        /* Efek Mata Raksasa (The Eye) */
        .void-eye {
            position: absolute;
            top: 50%; left: 50%;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(160,0,255,0.1) 30%, transparent 70%);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            filter: blur(60px);
            animation: pulse-eye 10s ease-in-out infinite;
        }

        /* Pola Fraktal/Distorsi Ruang */
        .void-fractal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.4; mix-blend-mode: overlay;
        }

        /* Partikel Infinite melayang */
        .particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 200%;
            background: url('https://i.ibb.co/5G7y8yM/void-particles.png');
            opacity: 0.3;
            animation: move-particles 40s linear infinite;
        }

        @keyframes pulse-eye {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        @keyframes move-particles {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        /* --- UI STYLING --- */
        .glow-text { 
            text-shadow: 0 0 20px var(--purple-void), 0 0 40px rgba(160, 0, 255, 0.4); 
            background: linear-gradient(to bottom, #fff, var(--purple-void));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .void-card { 
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s;
        }

        .void-card:hover {
            border-color: var(--purple-void);
            box-shadow: 0 0 30px rgba(160, 0, 255, 0.2);
            transform: translateY(-5px);
        }

        .product-img {
            width: 100%; height: 180px; object-fit: cover; border-radius: 1rem;
            filter: contrast(1.1) brightness(1.1);
        }

        @media (min-width: 768px) { .product-img { height: 240px; } }

        .tab-active { background: var(--purple-void) !important; color: white !important; box-shadow: 0 0 15px var(--purple-void); }
        .is-sold-out { opacity: 0.5; filter: grayscale(1); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="unlimited-void-container">
        <div class="void-eye"></div>
        <div class="void-fractal"></div>
        <div class="particles"></div>
    </div>

    <header class="text-center mb-12 relative z-10">
        <div class="flex justify-end mb-6">
            <button onclick="showLogin()" id="loginBtn" class="text-[8px] border border-white/20 px-3 py-1.5 rounded-full text-gray-400 uppercase tracking-widest hover:border-purple-500 transition">Terminal</button>
        </div>
        
        <h1 class="text-6xl md:text-8xl font-bold glow-text mb-2 italic tracking-tighter uppercase">Void Store</h1>
        <p class="text-purple-400 text-[9px] tracking-[0.8em] uppercase mb-10">Absolute Infinity</p>
        
        <div class="max-w-xl mx-auto mb-8 px-4">
            <input type="text" id="searchBar" oninput="handleSearch(this.value)" placeholder="Enter the void..." class="w-full bg-white/5 border-b border-white/10 p-4 outline-none focus:border-purple-500 transition text-white text-center text-lg">
        </div>

        <div class="flex overflow-x-auto justify-start md:justify-center gap-2 no-scrollbar" id="tabsContainer"></div>
    </header>

    <main id="catalog" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 mb-24 relative z-10"></main>

    <div id="loginModal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-2xl">
        <div class="void-card p-10 rounded-[2.5rem] w-full max-w-xs border-t-2 border-purple-600">
            <h2 class="text-xl font-bold mb-8 text-center tracking-widest">AUTHENTICATE</h2>
            <div class="space-y-4">
                <input type="text" id="userIn" placeholder="Admin ID" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                <input type="password" id="passIn" placeholder="Key" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                <button onclick="attemptLogin()" class="w-full bg-purple-600 text-white font-bold py-4 rounded-xl">SYNC</button>
                <button onclick="hideLogin()" class="w-full text-gray-600 text-xs py-2">Abort</button>
            </div>
        </div>
    </div>

    <section id="adminPanel" class="max-w-6xl mx-auto mb-16 p-6 void-card rounded-[2rem] hidden border-t-2 border-purple-600 relative z-10">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-[10px] font-bold text-purple-400 uppercase tracking-widest">Master Control</h2>
            <button onclick="logout()" class="text-red-500 text-[10px]">OFF</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-xs">
            <div class="space-y-3">
                <input type="text" id="pName" placeholder="Name" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg">
                <input type="text" id="pPrice" placeholder="Price" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg">
                <input type="text" id="pImg" placeholder="Image Link" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg">
                <select id="pCatSelect" class="w-full bg-black border border-white/10 p-2 rounded-lg"></select>
                <button onclick="addProduct()" class="w-full bg-white text-black font-bold py-2 rounded-lg">UPLOAD</button>
            </div>
            <div class="space-y-2" id="adminCatList"></div>
            <div class="space-y-2">
                <input type="text" id="cfgTele" class="w-full bg-white/5 p-2 rounded-lg text-[9px]">
                <input type="text" id="cfgWa" class="w-full bg-white/5 p-2 rounded-lg text-[9px]">
                <button onclick="updateConfig()" class="w-full border border-purple-500 text-purple-500 py-2 rounded-lg text-[9px]">SYNC CONFIG</button>
            </div>
        </div>
    </section>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyBSH2PhtUHv16CzGiMro6c2aODAtpltZrU",
            authDomain: "voidstore-b995f.firebaseapp.com",
            databaseURL: "https://voidstore-b995f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voidstore-b995f",
            storageBucket: "voidstore-b995f.firebasestorage.app",
            messagingSenderId: "210609106495",
            appId: "1:210609106495:web:d3d6d31d9ca8427c48928a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false, masterData = null, categories = {}, shopConfig = { tele: 'apipvoid', wa: '628', text: 'Order' }, currentTab = 'all', searchQuery = '';

        function showLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function hideLogin() { document.getElementById('loginModal').classList.add('hidden'); }
        function attemptLogin() {
            if(document.getElementById('userIn').value === "admin9080" && document.getElementById('passIn').value === "9080") {
                isAdmin = true; document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('loginBtn').classList.add('hidden'); hideLogin(); render();
            } else { alert("VOID REJECTED"); }
        }
        function logout() { isAdmin = false; document.getElementById('adminPanel').classList.add('hidden'); document.getElementById('loginBtn').classList.remove('hidden'); render(); }

        db.ref('config').on('value', snap => { if(snap.val()) shopConfig = snap.val(); render(); });
        db.ref('categories').on('value', snap => { categories = snap.val() || {}; updateCategoryUI(); });
        db.ref('products').on('value', snap => { masterData = snap.val(); render(); });

        function updateCategoryUI() {
            const tabs = document.getElementById('tabsContainer');
            const select = document.getElementById('pCatSelect');
            tabs.innerHTML = `<button onclick="changeTab('all', event)" class="tab-btn tab-active px-5 py-2 rounded-full border border-white/10 text-[10px] font-bold uppercase whitespace-nowrap">All</button>`;
            select.innerHTML = '';
            Object.keys(categories).forEach(key => {
                const name = categories[key].name;
                const slug = name.toLowerCase().replace(/\s+/g, '-');
                tabs.innerHTML += `<button onclick="changeTab('${slug}', event)" class="tab-btn px-5 py-2 rounded-full border border-white/10 text-[10px] font-bold uppercase whitespace-nowrap">${name}</button>`;
                select.innerHTML += `<option value="${slug}">${name}</option>`;
            });
        }

        function render() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = ''; if(!masterData) return;
            Object.keys(masterData).forEach(key => {
                const item = masterData[key];
                if((currentTab === 'all' || item.category === currentTab) && item.name.toLowerCase().includes(searchQuery.toLowerCase())) {
                    catalog.innerHTML += `
                        <div class="void-card rounded-[2rem] p-4 ${item.soldOut ? 'is-sold-out' : ''} relative">
                            ${isAdmin ? `<button onclick="deleteItem('${key}')" class="absolute top-2 right-2 bg-red-600 w-7 h-7 rounded-full z-40">✕</button>` : ''}
                            <img src="${item.img}" class="product-img mb-4" onerror="this.src='https://via.placeholder.com/300x300/000/a0f?text=VOID'">
                            <h3 class="font-bold mb-1 text-[12px] truncate">${item.name}</h3>
                            <p class="text-purple-400 font-bold mb-4 text-[11px]">IDR ${item.price}</p>
                            <a href="https://wa.me/${shopConfig.wa}?text=Order%20${item.name}" target="_blank" class="block bg-white text-black text-center py-2.5 rounded-xl text-[10px] font-bold uppercase">WhatsApp</a>
                        </div>
                    `;
                }
            });
        }

        function addCategory() { const n = document.getElementById('newCatName').value; if(n) db.ref('categories').push({name:n}); }
        function addProduct() {
            const n = document.getElementById('pName').value, p = document.getElementById('pPrice').value, i = document.getElementById('pImg').value, c = document.getElementById('pCatSelect').value;
            if(n && p) db.ref('products').push({name:n, price:p, img:i, category:c, soldOut:false});
        }
        function deleteItem(k) { if(confirm("Hapus?")) db.ref('products/'+k).remove(); }
        function handleSearch(v) { searchQuery = v; render(); }
        function changeTab(t, e) {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            if(e) e.target.classList.add('tab-active');
            render();
        }
    </script>
</body>
</html>
