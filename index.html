<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID STORE | Neo-Cyber Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --p-void: #bc13fe; --bg: #050505; }
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif;
            scroll-behavior: smooth;
        }
        h1, h2, h3, .font-syne { font-family: 'Syne', sans-serif; }

        /* LOADING SCREEN */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .load-text { font-size: 5rem; font-weight: 800; letter-spacing: -2px; line-height: 0.8; }
        
        /* THEMES */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .void-card { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .void-card:hover { transform: translateY(-10px); border-color: var(--p-void); box-shadow: 0 0 30px rgba(188, 19, 254, 0.15); }
        
        .btn-gradient { background: linear-gradient(90deg, #bc13fe, #7a12f5); transition: 0.3s; }
        .btn-gradient:hover { filter: brightness(1.2); transform: scale(1.05); }

        /* CUSTOM SCROLL */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--p-void); border-radius: 10px; }

        .is-editing { border: 2px solid #fbbf24 !important; }
    </style>
</head>
<body class="p-4 md:p-12">

    <div id="loader">
        <div class="text-center">
            <h1 class="load-text animate-pulse italic">VOID<br><span class="text-[#bc13fe]">STORE.</span></h1>
            <p class="mt-4 tracking-[0.5em] text-[10px] uppercase opacity-50">Coded by Apip</p>
        </div>
    </div>

    <div class="fixed top-0 left-0 w-full h-full -z-10 opacity-20">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#bc13fe] blur-[150px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#4e12f5] blur-[150px] rounded-full"></div>
    </div>

    <nav class="flex justify-between items-center mb-16 relative z-50">
        <div class="text-2xl font-extrabold tracking-tighter">V<span class="text-[#bc13fe]">S</span></div>
        <button onclick="showLogin()" id="loginBtn" class="text-[10px] font-bold tracking-widest uppercase border-b border-white/20 pb-1 hover:text-[#bc13fe] hover:border-[#bc13fe] transition">Terminal Access</button>
    </nav>

    <header class="max-w-4xl mx-auto text-center mb-20">
        <h2 class="text-6xl md:text-8xl font-extrabold mb-6 tracking-tighter uppercase italic">Neo Artifacts<span class="text-[#bc13fe]">.</span></h2>
        <div class="glass p-2 rounded-2xl flex items-center max-w-xl mx-auto shadow-2xl">
            <input type="text" id="searchBar" oninput="handleSearch(this.value)" placeholder="Find your frequency..." class="w-full bg-transparent p-4 outline-none text-center font-medium">
        </div>
        <div id="tabsContainer" class="flex flex-wrap justify-center gap-2 mt-8"></div>
    </header>

    <main id="catalog" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-32"></main>

    <div id="cartFloat" class="fixed bottom-8 right-8 z-[100] glass p-6 rounded-[2.5rem] border-2 border-[#bc13fe] w-80 translate-y-[150%] transition-transform duration-500">
        <h3 class="font-bold text-xs uppercase mb-4 tracking-widest text-[#bc13fe]">Current Order</h3>
        <div id="cartItems" class="max-h-48 overflow-y-auto mb-6 space-y-3 pr-2"></div>
        <div class="space-y-2">
            <button onclick="checkout('wa')" class="w-full bg-[#25d366] text-black font-bold py-3 rounded-2xl text-[10px] uppercase">Send to WhatsApp</button>
            <button onclick="checkout('tele')" class="w-full bg-[#0088cc] text-white font-bold py-3 rounded-2xl text-[10px] uppercase">Send to Telegram</button>
            <button onclick="clearCart()" class="w-full text-gray-500 text-[9px] uppercase font-bold tracking-widest">Clear List</button>
        </div>
    </div>

    <section id="adminPanel" class="max-w-6xl mx-auto mb-32 p-8 glass rounded-[3rem] hidden border-t-2 border-[#bc13fe]">
        <div class="flex justify-between items-center mb-10">
            <h3 class="text-xl font-bold uppercase italic" id="adminTitle">Master Terminal</h3>
            <button onclick="logout()" class="text-red-500 text-[10px] font-bold underline">EXIT</button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="space-y-4">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em]">Editor</p>
                <input type="hidden" id="pEditKey">
                <input type="text" id="pName" placeholder="Artifact Name" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 focus:border-[#bc13fe]">
                <input type="number" id="pPrice" placeholder="Price (Numbers)" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                <textarea id="pDesc" placeholder="Artifact Description..." class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 h-24 text-sm"></textarea>
                <input type="text" id="pImg" placeholder="Image URL" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                <select id="pCatSelect" class="w-full bg-black/50 p-4 rounded-2xl border border-white/10"></select>
                <button id="pSubmitBtn" onclick="addProduct()" class="w-full btn-gradient font-black py-4 rounded-2xl text-xs uppercase tracking-widest shadow-lg">Push Data</button>
                <button id="pCancelEdit" onclick="cancelEdit()" class="w-full hidden text-xs text-gray-400">Cancel Edit</button>
            </div>

            <div class="space-y-4">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em]">Map Sections</p>
                <div class="flex gap-2">
                    <input type="text" id="newCatName" placeholder="New Label" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <button onclick="addCategory()" class="bg-[#bc13fe] px-6 rounded-2xl font-bold">+</button>
                </div>
                <div id="adminCatList" class="space-y-2"></div>
            </div>

            <div class="space-y-4">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em]">Core Config</p>
                <input type="text" id="cfgWa" placeholder="WA (628...)" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10">
                <input type="text" id="cfgTele" placeholder="Telegram User (tanpa @)" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10">
                <textarea id="cfgText" placeholder="Default Order Message" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 h-24 text-sm"></textarea>
                <button onclick="updateConfig()" class="w-full border border-[#bc13fe] text-[#bc13fe] font-bold py-4 rounded-2xl text-[10px] uppercase">Sync Core</button>
            </div>
        </div>
    </section>

    <div id="loginModal" class="fixed inset-0 bg-black/95 z-[999] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="glass p-12 rounded-[3.5rem] w-full max-w-sm text-center border-b-8 border-[#bc13fe]">
            <h2 class="text-3xl font-black mb-8 italic uppercase">Auth Required</h2>
            <input type="text" id="userIn" placeholder="IDENTIFIER" class="w-full bg-white/5 p-4 rounded-2xl mb-4 border border-white/10 outline-none text-center">
            <input type="password" id="passIn" placeholder="ACCESS KEY" class="w-full bg-white/5 p-4 rounded-2xl mb-8 border border-white/10 outline-none text-center">
            <button onclick="attemptLogin()" class="w-full btn-gradient py-4 rounded-2xl font-black tracking-widest shadow-2xl">ACCESS</button>
            <button onclick="hideLogin()" class="mt-6 text-gray-600 text-[10px] uppercase font-bold">Abort</button>
        </div>
    </div>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBSH2PhtUHv16CzGiMro6c2aODAtpltZrU",
            authDomain: "voidstore-b995f.firebaseapp.com",
            databaseURL: "https://voidstore-b995f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voidstore-b995f",
            storageBucket: "voidstore-b995f.firebasestorage.app",
            messagingSenderId: "210609106495",
            appId: "1:210609106495:web:d3d6d31d9ca8427c48928a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { isAdmin: false, products: {}, categories: {}, config: {}, cart: [], currentTab: 'all', search: '', editMode: false };

        // INITIAL LOAD
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.transform = 'translateY(-100%)';
            }, 2000);
        };

        // DATABASE LISTENERS
        db.ref('/').on('value', snap => {
            const data = snap.val() || {};
            state.products = data.products || {};
            state.categories = data.categories || {};
            state.config = data.config || { wa: '628', tele: 'void', text: 'Saya mau order artifact ini' };
            render();
        });

        function render() {
            renderTabs();
            renderCatalog();
            renderAdmin();
            renderCart();
        }

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            let html = `<button onclick="setTab('all')" class="px-8 py-3 rounded-2xl text-[10px] font-black uppercase transition-all ${state.currentTab === 'all' ? 'btn-gradient border-none' : 'glass opacity-50'}">All Space</button>`;
            Object.keys(state.categories).forEach(k => {
                const name = state.categories[k].name;
                const slug = name.toLowerCase().replace(/\s+/g, '-');
                html += `<button onclick="setTab('${slug}')" class="px-8 py-3 rounded-2xl text-[10px] font-black uppercase transition-all ${state.currentTab === slug ? 'btn-gradient border-none' : 'glass opacity-50'}">${name}</button>`;
            });
            container.innerHTML = html;
        }

        function renderCatalog() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';
            
            Object.keys(state.products).forEach(id => {
                const p = state.products[id];
                const matchesTab = (state.currentTab === 'all' || p.category === state.currentTab);
                const matchesSearch = p.name.toLowerCase().includes(state.search.toLowerCase());

                if (matchesTab && matchesSearch) {
                    catalog.innerHTML += `
                        <div class="void-card glass p-4 rounded-[2.5rem] relative group border border-white/5">
                            ${p.soldOut ? '<div class="absolute inset-0 z-20 flex items-center justify-center font-black text-2xl rotate-12 text-white border-4 border-white m-10 pointer-events-none bg-black/40 backdrop-blur-sm">VOID</div>' : ''}
                            <img src="${p.img}" class="w-full h-64 object-cover rounded-[2rem] mb-6 ${p.soldOut ? 'grayscale contrast-50' : ''}">
                            <div class="px-2 pb-2">
                                <h3 class="font-bold text-xl leading-tight mb-2">${p.name}</h3>
                                <p class="text-xs text-gray-500 mb-4 line-clamp-2">${p.desc || 'No description available for this artifact.'}</p>
                                <div class="flex justify-between items-center mb-6">
                                    <p class="text-[#bc13fe] font-black">IDR ${Number(p.price).toLocaleString('id-ID')}</p>
                                </div>
                                ${!p.soldOut ? `<button onclick="addToCart('${id}')" class="w-full bg-white text-black py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-[#bc13fe] hover:text-white transition">Add to List</button>` : ''}
                            </div>
                            
                            ${state.isAdmin ? `
                                <div class="absolute top-4 left-4 flex flex-col gap-2 z-30">
                                    <button onclick="startEdit('${id}')" class="bg-yellow-500 p-3 rounded-full text-xs shadow-xl font-bold">Edit</button>
                                    <button onclick="db.ref('products/${id}').remove()" class="bg-red-600 p-3 rounded-full text-xs shadow-xl font-bold">Del</button>
                                    <button onclick="db.ref('products/${id}').update({soldOut: ${!p.soldOut}})" class="bg-black p-3 border border-white/20 rounded-full text-xs shadow-xl font-bold">Toggle</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
            });
        }

        // CART & CHECKOUT
        function addToCart(id) {
            state.cart.push(state.products[id]);
            renderCart();
            document.getElementById('cartFloat').style.transform = 'translateY(0)';
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            container.innerHTML = state.cart.map((item, index) => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl animate-slide-in">
                    <div class="pr-4">
                        <p class="text-[11px] font-bold truncate w-40">${item.name}</p>
                        <p class="text-[9px] text-[#bc13fe]">IDR ${Number(item.price).toLocaleString('id-ID')}</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-500 text-xs">✕</button>
                </div>
            `).join('');
            if (state.cart.length === 0) document.getElementById('cartFloat').style.transform = 'translateY(150%)';
        }

        function removeFromCart(i) { state.cart.splice(i, 1); renderCart(); }
        function clearCart() { state.cart = []; renderCart(); }

        function checkout(platform) {
            const items = state.cart.map(i => `- ${i.name} (IDR ${Number(i.price).toLocaleString('id-ID')})`).join('%0A');
            const total = state.cart.reduce((sum, item) => sum + Number(item.price), 0);
            const msg = `${state.config.text}:%0A${items}%0A%0A*Total: IDR ${total.toLocaleString('id-ID')}*`;
            
            if(platform === 'wa') window.open(`https://wa.me/${state.config.wa}?text=${msg}`);
            if(platform === 'tele') window.open(`https://t.me/${state.config.tele}?text=${msg}`);
        }

        // ADMIN FEATURES
        function startEdit(id) {
            const p = state.products[id];
            state.editMode = true;
            document.getElementById('pEditKey').value = id;
            document.getElementById('pName').value = p.name;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pDesc').value = p.desc || '';
            document.getElementById('pImg').value = p.img;
            document.getElementById('pCatSelect').value = p.category;
            
            document.getElementById('pSubmitBtn').innerText = "Update Artifact";
            document.getElementById('pCancelEdit').classList.remove('hidden');
            document.getElementById('adminTitle').innerText = "Edit Mode Activated";
            window.scrollTo(0, document.getElementById('adminPanel').offsetTop - 50);
        }

        function cancelEdit() {
            state.editMode = false;
            document.getElementById('pEditKey').value = '';
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pDesc').value = '';
            document.getElementById('pImg').value = '';
            document.getElementById('pSubmitBtn').innerText = "Push Data";
            document.getElementById('pCancelEdit').classList.add('hidden');
            document.getElementById('adminTitle').innerText = "Master Terminal";
        }

        function addProduct() {
            const n = document.getElementById('pName').value, 
                  p = document.getElementById('pPrice').value, 
                  i = document.getElementById('pImg').value, 
                  c = document.getElementById('pCatSelect').value,
                  d = document.getElementById('pDesc').value,
                  key = document.getElementById('pEditKey').value;

            if(n && p && c) {
                const data = { name:n, price:p, img:i || 'https://via.placeholder.com/600', category:c, desc:d, soldOut:false };
                if(state.editMode) {
                    db.ref('products/' + key).update(data);
                    cancelEdit();
                } else {
                    db.ref('products').push(data);
                }
                document.getElementById('pName').value = ''; 
                document.getElementById('pPrice').value = '';
                document.getElementById('pDesc').value = '';
                document.getElementById('pImg').value = '';
            } else alert("Field Name & Price must be filled!");
        }

        // UTILS
        function setTab(t) { state.currentTab = t; render(); }
        function handleSearch(v) { state.search = v; render(); }
        function showLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function hideLogin() { document.getElementById('loginModal').classList.add('hidden'); }
        function attemptLogin() {
            if(document.getElementById('userIn').value === 'admin9080' && document.getElementById('passIn').value === '9080') {
                state.isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                hideLogin(); render();
            } else alert('Wrong Key!');
        }
        function logout() { state.isAdmin = false; document.getElementById('adminPanel').classList.add('hidden'); render(); }
        function addCategory() {
            const n = document.getElementById('newCatName').value;
            if(n) db.ref('categories').push({name:n});
            document.getElementById('newCatName').value = '';
        }
        function updateConfig() {
            db.ref('config').set({
                wa: document.getElementById('cfgWa').value,
                tele: document.getElementById('cfgTele').value,
                text: document.getElementById('cfgText').value
            });
            alert("System Config Synced!");
        }

        function renderAdmin() {
            const select = document.getElementById('pCatSelect');
            const list = document.getElementById('adminCatList');
            select.innerHTML = ''; list.innerHTML = '';
            Object.keys(state.categories).forEach(k => {
                const cat = state.categories[k];
                const slug = cat.name.toLowerCase().replace(/\s+/g, '-');
                select.innerHTML += `<option value="${slug}">${cat.name}</option>`;
                list.innerHTML += `<div class="flex justify-between bg-white/5 p-3 rounded-2xl text-xs"><span>${cat.name}</span><button onclick="db.ref('categories/${k}').remove()" class="text-red-500">✕</button></div>`;
            });
            document.getElementById('cfgWa').value = state.config.wa || '';
            document.getElementById('cfgTele').value = state.config.tele || '';
            document.getElementById('cfgText').value = state.config.text || '';
        }
    </script>
</body>
</html>
