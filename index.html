<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID STORE | By Apip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --purple-gojo: #a0f; }
        body { background-color: #050505; color: white; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
        .glow-text { text-shadow: 0 0 15px var(--purple-gojo); }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(160, 0, 255, 0.2); 
            transition: 0.4s; 
        }
        .btn-tele { background: linear-gradient(45deg, #a0f, #60f); }
        .btn-delete {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 0, 0, 0.7); color: white;
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; z-index: 50;
            border: none; transition: 0.3s;
        }
        .btn-delete:hover { background: red; transform: scale(1.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="text-center mb-16">
        <h1 class="text-6xl font-bold glow-text mb-2 italic">VOID STORE</h1>
        <p id="adminStatus" class="text-gray-500 text-xs tracking-widest uppercase">Public View</p>
    </header>

    <section id="adminPanel" class="max-w-2xl mx-auto mb-20 p-8 glass-card rounded-3xl hidden">
        <h2 class="text-xl font-bold mb-6 text-purple-400">Admin Mode Activated</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" id="pName" placeholder="Nama Produk..." class="bg-black border border-gray-800 p-3 rounded-xl focus:border-purple-500 outline-none">
            <input type="text" id="pPrice" placeholder="Harga (Contoh: 150k)..." class="bg-black border border-gray-800 p-3 rounded-xl focus:border-purple-500 outline-none">
            <input type="text" id="pImg" placeholder="Link Gambar (URL)..." class="bg-black border border-gray-800 p-3 rounded-xl md:col-span-2 outline-none">
            <button onclick="addProduct()" class="md:col-span-2 bg-white text-black font-bold py-3 rounded-xl hover:bg-purple-500 hover:text-white transition uppercase">Simpan Produk</button>
            <button onclick="logoutAdmin()" class="md:col-span-2 text-gray-500 text-xs mt-2 underline">Keluar Mode Admin</button>
        </div>
    </section>

    <main id="catalog" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></main>

    <script>
        const TELEGRAM_USERNAME = "fyzzrq"; // Ganti ke username Telegram kamu
        const ADMIN_PASSWORD = "201120"; // Password rahasia kamu
        
        let products = JSON.parse(localStorage.getItem('void_store_data')) || [];
        let isAdminMode = false;

        // FUNGSI 1: Deteksi Login (Shift + A)
        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === 'A') {
                const pass = prompt("Masukkan Password Admin:");
                if (pass === ADMIN_PASSWORD) {
                    isAdminMode = true;
                    document.getElementById('adminPanel').classList.remove('hidden');
                    document.getElementById('adminStatus').innerText = "ADMIN MODE ACTIVE";
                    document.getElementById('adminStatus').style.color = "#a0f";
                    renderProducts();
                } else {
                    alert("Password Salah!");
                }
            }
        });

        function logoutAdmin() {
            isAdminMode = false;
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('adminStatus').innerText = "Public View";
            document.getElementById('adminStatus').style.color = "#666";
            renderProducts();
        }

        // FUNGSI 2: Render Produk (Menampilkan ke Layar)
        function renderProducts() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';

            products.forEach((item, index) => {
                // Tombol Delete hanya muncul jika isAdminMode = true
                const deleteButton = isAdminMode ? 
                    `<button class="btn-delete" onclick="deleteItem(${index})">✕</button>` : '';

                catalog.innerHTML += `
                    <div class="glass-card rounded-[2rem] overflow-hidden p-4 relative group">
                        ${deleteButton}
                        <img src="${item.img}" class="w-full h-64 object-cover rounded-2xl mb-4 grayscale group-hover:grayscale-0 transition duration-500">
                        <h3 class="text-xl font-bold mb-1">${item.name}</h3>
                        <p class="text-purple-500 font-bold mb-4">RP ${item.price}</p>
                        <a href="https://t.me/${TELEGRAM_USERNAME}?text=Halo, order ${item.name}" target="_blank" 
                           class="btn-tele block text-center py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest text-white">
                           Buy via Telegram
                        </a>
                    </div>
                `;
            });
        }

        // FUNGSI 3: Tambah Produk
        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value || 'https://via.placeholder.com/300';

            if (name && price) {
                products.push({ name, price, img });
                saveData();
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImg').value = '';
            } else {
                alert("Isi nama dan harga produk!");
            }
        }

        // FUNGSI 4: Hapus Produk (YANG KAMU MINTA)
        function deleteItem(index) {
            if (confirm(`Yakin ingin menghapus "${products[index].name}"?`)) {
                products.splice(index, 1); // Menghapus 1 item dari array berdasarkan index
                saveData(); // Simpan perubahan ke memori
            }
        }

        // FUNGSI 5: Simpan ke Memori Browser
        function saveData() {
            localStorage.setItem('void_store_data', JSON.stringify(products));
            renderProducts(); // Update tampilan layar secara otomatis
        }

        // Jalankan saat pertama kali buka
        window.onload = renderProducts;
    </script>
</body>
</html>
