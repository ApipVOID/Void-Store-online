<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID STORE | Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --purple-void: #a0f; }
        body { background-color: #000; color: white; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* UNLIMITED VOID BG - Ringan untuk HP */
        .void-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(160, 0, 255, 0.08) 0%, transparent 80%);
            z-index: -1; pointer-events: none;
        }

        .glow-text { text-shadow: 0 0 15px var(--purple-void); }

        /* KARTU VOID - Mobile Glassmorphism */
        .void-card { 
            background: rgba(10, 10, 10, 0.7); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(160, 0, 255, 0.2);
            transition: 0.3s;
        }

        /* HD IMAGE FIX */
        .product-img {
            width: 100%; height: 200px; object-fit: cover; border-radius: 1.2rem;
            filter: contrast(1.1) brightness(1.1);
        }

        @media (min-width: 768px) { .product-img { height: 250px; } }

        /* TOMBOL TAB SCROLLABLE DI HP */
        .tabs-wrapper {
            display: flex; overflow-x: auto; white-space: nowrap; gap: 8px; padding-bottom: 10px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .tabs-wrapper::-webkit-scrollbar { display: none; }

        .tab-active { background: var(--purple-void) !important; color: white !important; box-shadow: 0 0 15px var(--purple-void); border-color: var(--purple-void) !important; }

        .sold-out-badge { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg);
            background: var(--purple-void); color: white; padding: 4px 12px; font-weight: bold;
            border: 1px solid white; z-index: 20; font-size: 10px; box-shadow: 0 0 15px var(--purple-void);
        }

        .is-sold-out img { filter: grayscale(100%) brightness(0.2) !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="void-bg"></div>

    <div class="flex justify-end mb-4">
        <button onclick="showLogin()" id="loginBtn" class="text-[8px] border border-gray-800 px-3 py-1.5 rounded-full text-gray-600 uppercase tracking-widest active:scale-95 transition">
            Terminal Access
        </button>
    </div>

    <header class="text-center mb-10">
        <h1 class="text-5xl md:text-8xl font-bold glow-text mb-1 italic uppercase tracking-tighter">Void Store</h1>
        <p class="text-purple-400 text-[8px] tracking-[0.6em] uppercase mb-8 opacity-70">Unlimited Expansion</p>
        
        <div class="max-w-xl mx-auto mb-6">
            <input type="text" id="searchBar" oninput="handleSearch(this.value)" placeholder="Search artifact..." class="w-full bg-white/5 border border-white/10 p-3 rounded-2xl outline-none focus:border-purple-500 transition text-white text-center text-sm">
        </div>

        <div class="tabs-wrapper justify-center" id="tabsContainer"></div>
    </header>

    <div id="loginModal" class="fixed inset-0 bg-black/98 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-lg">
        <div class="void-card p-8 rounded-[2rem] w-full max-w-xs border-t-2 border-purple-600">
            <h2 class="text-lg font-bold mb-6 text-center glow-text">AUTHENTICATE</h2>
            <div class="space-y-4">
                <input type="text" id="userIn" placeholder="User ID" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-sm">
                <input type="password" id="passIn" placeholder="Pass Key" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-sm">
                <button onclick="attemptLogin()" class="w-full bg-purple-600 text-white font-bold py-3 rounded-xl active:scale-95 transition">LOGIN</button>
                <button onclick="hideLogin()" class="w-full text-gray-600 text-[10px] py-2 uppercase">Abort</button>
            </div>
        </div>
    </div>

    <section id="adminPanel" class="max-w-6xl mx-auto mb-12 p-6 void-card rounded-[2rem] hidden border-t-2 border-purple-600">
        <div class="flex justify-between items-center mb-6 pb-2 border-b border-white/10">
            <h2 class="text-[10px] font-bold text-purple-400 uppercase tracking-widest italic">Admin Panel</h2>
            <button onclick="logout()" class="text-red-500 text-[10px] border border-red-500/20 px-2 py-1 rounded-lg">OFF</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-xs">
            <div class="space-y-3">
                <input type="text" id="pName" placeholder="Name" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none">
                <input type="text" id="pPrice" placeholder="Price" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none">
                <input type="text" id="pImg" placeholder="Image Link" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none">
                <select id="pCatSelect" class="w-full bg-black border border-white/10 p-2 rounded-lg outline-none"></select>
                <button onclick="addProduct()" class="w-full bg-white text-black font-bold py-2 rounded-lg">ADD ITEM</button>
            </div>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <input type="text" id="newCatName" placeholder="Category Name" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none">
                    <button onclick="addCategory()" class="bg-purple-600 px-3 rounded-lg">+</button>
                </div>
                <div id="adminCatList" class="space-y-1 max-h-32 overflow-y-auto pr-1"></div>
            </div>
            <div class="space-y-2">
                <input type="text" id="cfgTele" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg text-[10px]">
                <input type="text" id="cfgWa" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg text-[10px]">
                <input type="text" id="cfgText" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg text-[10px]">
                <button onclick="updateConfig()" class="w-full border border-purple-500 text-purple-500 py-2 rounded-lg text-[10px]">SYNC CONFIG</button>
            </div>
        </div>
    </section>

    <main id="catalog" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-8 mb-20"></main>

    <footer class="py-12 text-center border-t border-white/5">
        <p class="text-gray-800 text-[8px] tracking-[0.5em] uppercase italic">Void Store by Apip</p>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBSH2PhtUHv16CzGiMro6c2aODAtpltZrU",
            authDomain: "voidstore-b995f.firebaseapp.com",
            databaseURL: "https://voidstore-b995f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voidstore-b995f",
            storageBucket: "voidstore-b995f.firebasestorage.app",
            messagingSenderId: "210609106495",
            appId: "1:210609106495:web:d3d6d31d9ca8427c48928a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false, masterData = null, categories = {}, shopConfig = { tele: 'apipvoid', wa: '628', text: 'Order' }, currentTab = 'all', searchQuery = '';

        function showLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function hideLogin() { document.getElementById('loginModal').classList.add('hidden'); }

        function attemptLogin() {
            if(document.getElementById('userIn').value === "admin9080" && document.getElementById('passIn').value === "9080") {
                isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('loginBtn').classList.add('hidden');
                hideLogin(); render();
            } else { alert("VOID REJECTED"); }
        }

        function logout() { isAdmin = false; document.getElementById('adminPanel').classList.add('hidden'); document.getElementById('loginBtn').classList.remove('hidden'); render(); }

        db.ref('config').on('value', snap => { if(snap.val()) { shopConfig = snap.val(); render(); } });
        db.ref('categories').on('value', snap => { categories = snap.val() || {}; updateCategoryUI(); });
        db.ref('products').on('value', snap => { masterData = snap.val(); render(); });

        function updateCategoryUI() {
            const tabs = document.getElementById('tabsContainer');
            const select = document.getElementById('pCatSelect');
            const list = document.getElementById('adminCatList');
            tabs.innerHTML = `<button onclick="changeTab('all', event)" class="tab-btn tab-active px-4 py-1.5 rounded-full border border-gray-800 text-[10px] font-bold uppercase transition">All Space</button>`;
            select.innerHTML = ''; list.innerHTML = '';
            Object.keys(categories).forEach(key => {
                const name = categories[key].name;
                const slug = name.toLowerCase().replace(/\s+/g, '-');
                tabs.innerHTML += `<button onclick="changeTab('${slug}', event)" class="tab-btn px-4 py-1.5 rounded-full border border-gray-800 text-[10px] font-bold uppercase transition">${name}</button>`;
                select.innerHTML += `<option value="${slug}">${name}</option>`;
                list.innerHTML += `<div class="flex justify-between bg-white/5 p-1 px-2 rounded mb-1 text-[9px]"><span>${name}</span><button onclick="deleteCategory('${key}')" class="text-red-500">✕</button></div>`;
            });
        }

        function render() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = ''; if(!masterData) return;
            Object.keys(masterData).forEach(key => {
                const item = masterData[key];
                if((currentTab === 'all' || item.category === currentTab) && item.name.toLowerCase().includes(searchQuery.toLowerCase())) {
                    const adminUI = isAdmin ? `
                        <button onclick="deleteItem('${key}')" class="absolute top-2 right-2 bg-red-600 text-white w-7 h-7 rounded-full z-40 text-xs">✕</button>
                        <button onclick="toggleSold('${key}', ${item.soldOut})" class="absolute top-2 left-2 bg-black/90 border border-purple-500 text-[7px] px-1.5 py-1 rounded z-40 uppercase font-bold">${item.soldOut ? 'Restock' : 'Sold'}</button>
                    ` : '';

                    catalog.innerHTML += `
                        <div class="void-card rounded-[1.5rem] p-3 ${item.soldOut ? 'is-sold-out' : ''} relative">
                            ${adminUI}
                            ${item.soldOut ? '<div class="sold-out-badge">SOLD</div>' : ''}
                            <img src="${item.img}" class="product-img mb-3" onerror="this.src='https://via.placeholder.com/300x300/000/a0f?text=VOID'">
                            <h3 class="font-bold mb-1 text-[11px] truncate">${item.name}</h3>
                            <p class="text-purple-400 font-bold mb-3 text-[10px]">IDR ${item.price}</p>
                            <div class="grid grid-cols-1 gap-1.5">
                                <a href="https://wa.me/${shopConfig.wa}?text=${encodeURIComponent(shopConfig.text + ' ' + item.name)}" target="_blank" class="bg-[#25d366] text-center py-2 rounded-xl text-[9px] font-bold text-white uppercase active:opacity-70 transition">WhatsApp</a>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function addCategory() { const n = document.getElementById('newCatName').value; if(n) db.ref('categories').push({name:n}); document.getElementById('newCatName').value=''; }
        function deleteCategory(k) { if(confirm("Hapus?")) db.ref('categories/'+k).remove(); }
        function addProduct() {
            const n = document.getElementById('pName').value, p = document.getElementById('pPrice').value, i = document.getElementById('pImg').value, c = document.getElementById('pCatSelect').value;
            if(n && p && c) { db.ref('products').push({name:n, price:p, img:i || 'https://via.placeholder.com/400', category:c, soldOut:false}); document.getElementById('pName').value=''; document.getElementById('pPrice').value=''; }
        }
        function deleteItem(k) { if(confirm("Hapus?")) db.ref('products/'+k).remove(); }
        function toggleSold(k, s) { db.ref('products/'+k).update({soldOut: !s}); }
        function updateConfig() { db.ref('config').set({ tele:document.getElementById('cfgTele').value, wa:document.getElementById('cfgWa').value, text:document.getElementById('cfgText').value }); alert("Synced!"); }
        function handleSearch(v) { searchQuery = v; render(); }
        function changeTab(t, e) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active')); if(e) e.target.classList.add('tab-active'); render(); }
    </script>
</body>
</html>
