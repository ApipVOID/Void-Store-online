<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID STORE | HD Bug-Free Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --purple-void: #a0f; }
        body { background-color: #000; color: white; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        .glow-text { text-shadow: 0 0 20px var(--purple-void); }

        /* THE VOID CARD DESIGN */
        .void-card { 
            background: linear-gradient(145deg, #050505, #0a0015); 
            border: 1px solid rgba(160, 0, 255, 0.15);
            position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .void-card:hover {
            transform: translateY(-8px);
            border-color: var(--purple-void);
            box-shadow: 0 0 30px rgba(160, 0, 255, 0.2);
        }

        /* HD PRODUCT IMAGE */
        .product-img {
            width: 100%; height: 240px; object-fit: cover; border-radius: 1.5rem;
            filter: contrast(1.1) brightness(1.1);
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.5s;
        }

        .void-card:hover .product-img { filter: contrast(1.2) brightness(1.2); }

        .btn-tele { background: linear-gradient(45deg, #0088cc, #00aaff); }
        .btn-wa { background: linear-gradient(45deg, #25d366, #128c7e); }
        
        .is-sold-out img { filter: grayscale(100%) brightness(0.2) !important; }
        .sold-out-badge { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg);
            background: var(--purple-void); color: white; padding: 4px 15px;
            font-weight: bold; border: 2px solid white; z-index: 20; pointer-events: none; font-size: 12px;
        }

        .tab-active { background: var(--purple-void) !important; color: white !important; box-shadow: 0 0 15px var(--purple-void); border-color: var(--purple-void) !important; }
        .hidden { display: none !important; }
        
        /* Custom Scrollbar untuk i3 agar enteng */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--purple-void); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="flex justify-end mb-6">
        <button onclick="showLogin()" id="loginBtn" class="text-[9px] border border-gray-800 px-4 py-2 rounded-full text-gray-600 uppercase tracking-widest hover:border-purple-500 transition">
            Admin Terminal
        </button>
    </div>

    <header class="text-center mb-12">
        <h1 class="text-6xl md:text-7xl font-bold glow-text mb-2 italic tracking-tighter uppercase">Void Store</h1>
        <p class="text-purple-500 text-[9px] tracking-[0.7em] uppercase mb-10">Premium Artifacts</p>
        
        <div class="max-w-xl mx-auto mb-8 px-4">
            <input type="text" id="searchBar" oninput="handleSearch(this.value)" placeholder="Search the void..." class="w-full bg-transparent border-b border-gray-800 p-4 outline-none focus:border-purple-500 transition text-white text-center text-lg">
        </div>

        <div class="flex flex-wrap justify-center gap-2" id="tabsContainer"></div>
    </header>

    <div id="loginModal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="void-card p-8 rounded-[2rem] w-full max-w-sm border-t-4 border-purple-600">
            <h2 class="text-xl font-bold mb-6 text-center tracking-widest">AUTHENTICATION</h2>
            <div class="space-y-4">
                <input type="text" id="userIn" placeholder="User ID" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-purple-500 text-sm">
                <input type="password" id="passIn" placeholder="Pass Key" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-purple-500 text-sm">
                <button onclick="attemptLogin()" class="w-full bg-purple-600 text-white font-bold py-3 rounded-xl hover:bg-purple-500 transition">LOGIN</button>
                <button onclick="hideLogin()" class="w-full text-gray-600 text-xs py-2">Cancel</button>
            </div>
        </div>
    </div>

    <section id="adminPanel" class="max-w-6xl mx-auto mb-16 p-6 void-card rounded-[2.5rem] hidden border-t-4 border-purple-600">
        <div class="flex justify-between items-center mb-8 pb-4 border-b border-white/5">
            <h2 class="text-sm font-bold text-purple-400 tracking-widest uppercase italic">Master Control</h2>
            <button onclick="logout()" class="text-red-500 text-[10px] font-bold border border-red-900/30 px-3 py-1 rounded-lg">LOGOUT</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="space-y-3">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Add Product</p>
                <input type="text" id="pName" placeholder="Name" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none text-sm focus:border-purple-500">
                <input type="text" id="pPrice" placeholder="Price" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none text-sm">
                <input type="text" id="pImg" placeholder="Direct Image Link" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none text-sm">
                <select id="pCatSelect" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none text-sm text-gray-400"></select>
                <button onclick="addProduct()" class="w-full bg-white text-black font-bold py-2 rounded-lg text-xs hover:bg-purple-500 hover:text-white transition uppercase">Post Product</button>
            </div>

            <div class="space-y-3">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Categories</p>
                <div class="flex gap-2">
                    <input type="text" id="newCatName" placeholder="New..." class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none text-sm">
                    <button onclick="addCategory()" class="bg-purple-600 px-4 rounded-lg">+</button>
                </div>
                <div id="adminCatList" class="space-y-1 max-h-40 overflow-y-auto"></div>
            </div>

            <div class="space-y-3">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Global Config</p>
                <input type="text" id="cfgTele" placeholder="Tele Username" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none text-xs">
                <input type="text" id="cfgWa" placeholder="WA Number (62...)" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none text-xs">
                <input type="text" id="cfgText" placeholder="Order Message" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg outline-none text-xs">
                <button onclick="updateConfig()" class="w-full border border-purple-500 text-purple-500 font-bold py-2 rounded-lg text-[10px] uppercase">Sync Config</button>
            </div>
        </div>
    </section>

    <main id="catalog" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8 mb-20"></main>

    <footer class="py-16 text-center border-t border-white/5">
        <p class="text-gray-800 text-[10px] tracking-[0.5em] uppercase">Void Store by Apip • 2026</p>
    </footer>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBSH2PhtUHv16CzGiMro6c2aODAtpltZrU",
            authDomain: "voidstore-b995f.firebaseapp.com",
            databaseURL: "https://voidstore-b995f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "voidstore-b995f",
            storageBucket: "voidstore-b995f.firebasestorage.app",
            messagingSenderId: "210609106495",
            appId: "1:210609106495:web:d3d6d31d9ca8427c48928a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false;
        let masterData = null;
        let categories = {};
        let shopConfig = { tele: 'apipvoid', wa: '628', text: 'Order' };
        let currentTab = 'all';
        let searchQuery = '';

        // LOGIN/LOGOUT
        function showLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function hideLogin() { document.getElementById('loginModal').classList.add('hidden'); }

        function attemptLogin() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;
            if(u === "admin9080" && p === "9080") {
                isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('loginBtn').classList.add('hidden');
                hideLogin();
                render();
            } else { alert("WRONG KEY"); }
        }

        function logout() {
            isAdmin = false;
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('loginBtn').classList.remove('hidden');
            render();
        }

        // LISTENERS
        db.ref('config').on('value', snap => {
            if(snap.val()) {
                shopConfig = snap.val();
                document.getElementById('cfgTele').value = shopConfig.tele;
                document.getElementById('cfgWa').value = shopConfig.wa;
                document.getElementById('cfgText').value = shopConfig.text;
                render();
            }
        });

        db.ref('categories').on('value', snap => {
            categories = snap.val() || {};
            updateCategoryUI();
        });

        db.ref('products').on('value', snap => {
            masterData = snap.val();
            render();
        });

        function updateCategoryUI() {
            const tabs = document.getElementById('tabsContainer');
            const select = document.getElementById('pCatSelect');
            const list = document.getElementById('adminCatList');
            
            tabs.innerHTML = `<button onclick="changeTab('all', event)" class="tab-btn tab-active px-5 py-2 rounded-full border border-gray-800 text-[10px] font-bold uppercase transition">All Space</button>`;
            select.innerHTML = ''; list.innerHTML = '';
            
            Object.keys(categories).forEach(key => {
                const name = categories[key].name;
                const slug = name.toLowerCase().replace(/\s+/g, '-');
                tabs.innerHTML += `<button onclick="changeTab('${slug}', event)" class="tab-btn px-5 py-2 rounded-full border border-gray-800 text-[10px] font-bold uppercase transition">${name}</button>`;
                select.innerHTML += `<option value="${slug}">${name}</option>`;
                list.innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-[10px]"><span>${name}</span><button onclick="deleteCategory('${key}')" class="text-red-500">✕</button></div>`;
            });
        }

        function render() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';
            if(!masterData) return;
            
            Object.keys(masterData).forEach(key => {
                const item = masterData[key];
                const matchesTab = (currentTab === 'all' || item.category === currentTab);
                const matchesSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase());

                if(matchesTab && matchesSearch) {
                    const adminUI = isAdmin ? `
                        <button onclick="deleteItem('${key}')" class="absolute top-3 right-3 bg-red-600 text-white w-8 h-8 rounded-full z-40 shadow-lg">✕</button>
                        <button onclick="toggleSold('${key}', ${item.soldOut})" class="absolute top-3 left-3 bg-black border border-purple-500 text-[8px] px-2 py-1 rounded-lg z-40 uppercase font-bold">
                            ${item.soldOut ? 'Available' : 'Sold Out'}
                        </button>
                    ` : '';

                    catalog.innerHTML += `
                        <div class="void-card rounded-[2rem] p-4 ${item.soldOut ? 'is-sold-out' : ''}">
                            ${adminUI}
                            ${item.soldOut ? '<div class="sold-out-badge">VOID / SOLD</div>' : ''}
                            <img src="${item.img}" class="product-img mb-4" onerror="this.src='https://via.placeholder.com/400x400/000/a0f?text=VOID+ITEM'">
                            <h3 class="font-bold mb-1 text-sm">${item.name}</h3>
                            <p class="text-purple-500 font-bold mb-4 text-sm italic">IDR ${item.price}</p>
                            <div class="grid grid-cols-2 gap-2">
                                <a href="https://t.me/${shopConfig.tele}?text=${encodeURIComponent(shopConfig.text + ' ' + item.name)}" target="_blank" class="btn-tele text-center py-2.5 rounded-xl text-[9px] font-bold text-white uppercase">Telegram</a>
                                <a href="https://wa.me/${shopConfig.wa}?text=${encodeURIComponent(shopConfig.text + ' ' + item.name)}" target="_blank" class="btn-wa text-center py-2.5 rounded-xl text-[9px] font-bold text-white uppercase">WhatsApp</a>
                            </div>
                        </div>
                    `;
                }
            });
        }

        // ACTIONS
        function addCategory() {
            const n = document.getElementById('newCatName').value;
            if(n) db.ref('categories').push({name:n});
            document.getElementById('newCatName').value = '';
        }
        function deleteCategory(k) { if(confirm("Hapus kategori?")) db.ref('categories/'+k).remove(); }
        
        function addProduct() {
            const n = document.getElementById('pName').value, p = document.getElementById('pPrice').value, i = document.getElementById('pImg').value, c = document.getElementById('pCatSelect').value;
            if(n && p && c) {
                db.ref('products').push({name:n, price:p, img:i || 'https://via.placeholder.com/400', category:c, soldOut:false});
                document.getElementById('pName').value=''; document.getElementById('pPrice').value='';
            } else { alert("Lengkapi data!"); }
        }

        function deleteItem(k) { if(confirm("Hapus barang?")) db.ref('products/'+k).remove(); }
        function toggleSold(k, s) { db.ref('products/'+k).update({soldOut: !s}); }
        function updateConfig() { 
            db.ref('config').set({ tele:document.getElementById('cfgTele').value, wa:document.getElementById('cfgWa').value, text:document.getElementById('cfgText').value });
            alert("Synced!");
        }
        function handleSearch(v) { searchQuery = v; render(); }
        function changeTab(t, e) {
            currentTab = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            if(e) e.target.classList.add('tab-active');
            render();
        }
    </script>
</body>
</html>
