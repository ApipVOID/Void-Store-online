    <style>
        :root { --gojo-purple: #a0f; --void-black: #050505; }
        
        body { 
            background-color: var(--void-black); 
            color: white; 
            font-family: 'Space Grotesk', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- UNLIMITED VOID BACKGROUND SYSTEM --- */
        .void-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #000;
        }

        /* The Eye of Void (Gojo Style) */
        .void-eye {
            position: absolute; top: 40%; left: 50%;
            width: 90vw; height: 90vw; max-width: 800px; max-height: 800px;
            background: 
                radial-gradient(circle at center, #fff 0%, transparent 10%),
                radial-gradient(circle at center, var(--gojo-purple) 0%, transparent 45%),
                radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.6;
            animation: pulse-eye 10s ease-in-out infinite;
        }

        /* Fractal Expansion Lines */
        .void-lines {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: repeating-radial-gradient(circle at center, 
                transparent 0, transparent 25px, 
                rgba(160, 0, 255, 0.05) 26px, rgba(160, 0, 255, 0.05) 27px);
            animation: rotate-void 150s linear infinite;
            opacity: 0.4;
        }

        @keyframes pulse-eye {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; }
        }

        @keyframes rotate-void {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- UI COMPONENTS --- */
        .glow-text { 
            text-shadow: 0 0 20px var(--gojo-purple), 0 0 40px rgba(160, 0, 255, 0.5); 
            background: linear-gradient(to bottom, #fff, #a0f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .void-card { 
            background: rgba(10, 10, 10, 0.55); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(160, 0, 255, 0.15);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .void-card:hover {
            transform: translateY(-8px);
            border-color: var(--gojo-purple);
            box-shadow: 0 0 30px rgba(160, 0, 255, 0.2);
        }

        .product-img {
            width: 100%; height: 200px; object-fit: cover; border-radius: 1.25rem;
            filter: contrast(1.1) brightness(1.05);
        }

        @media (min-width: 768px) { .product-img { height: 260px; } }

        /* Sold Out States */
        .is-sold-out { filter: grayscale(1) opacity(0.6); }
        .sold-badge {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg);
            background: var(--gojo-purple); color: white; padding: 6px 20px;
            font-weight: 900; border: 2px solid white; z-index: 30;
            box-shadow: 0 0 20px var(--gojo-purple); font-size: 14px;
        }

        /* Navigation Tabs */
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-btn { transition: 0.3s; white-space: nowrap; }
        .tab-active { 
            background: var(--gojo-purple) !important; 
            box-shadow: 0 0 15px var(--gojo-purple); 
            border-color: var(--gojo-purple) !important;
            color: white !important;
        }

        /* Admin Controls */
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }
        
        .hidden { display: none !important; }
    </style>
</head>
